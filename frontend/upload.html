<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>PetPaint 测试</title>
</head>
<body>
    <h1>上传宠物照片</h1>
    
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="handleUpload()">生成油画</button>
    
    <div id="status"></div>
    
    <img id="result" style="display:none; max-width:512px;">

    <script>
        async function handleUpload() {
            const file = document.getElementById('fileInput').files[0]
            if (!file) {
                alert('请先选择图片')
                return
            }

            document.getElementById('status').innerText = '生成中，请稍候...'

            const formData = new FormData()
            formData.append('file', file)

            const response = await fetch('https://chloezhoudev-petpaint-backend.hf.space/generate', {
                method: 'POST',
                body: formData
            })

            const blob = await response.blob()
            const url = URL.createObjectURL(blob)
            
            const img = document.getElementById('result')
            img.src = url
            img.style.display = 'block'
            
            document.getElementById('status').innerText = '完成！'
        }
    </script>
</body>
</html>
